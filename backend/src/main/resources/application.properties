spring.application.name=ChotaURL

# -------------------------------------------------------
# App settings
# -------------------------------------------------------
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.default-expiry-in-days=30
app.validate-original=${APP_VALIDATE_ORIGINAL:true}

# -------------------------------------------------------
# Database — values come from environment variables
# Fallback values are for safety only (override in prod!)
# -------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# -------------------------------------------------------
# JPA
# -------------------------------------------------------
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# -------------------------------------------------------
# Docker Compose integration — DISABLED in production
# Override to "start_only" in application-local.properties
# -------------------------------------------------------
spring.docker.compose.lifecycle-management=none
